<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NSC Micro Market Analytics{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 600; letter-spacing: 0.02em; }
        .nav-link.active { font-weight: 600; }
        .stat-card { border-left: 4px solid; }
        .stat-card.danger { border-left-color: #dc3545; }
        .stat-card.warning { border-left-color: #ffc107; }
        .stat-card.success { border-left-color: #198754; }
        .stat-card.info { border-left-color: #0dcaf0; }
        table th { white-space: nowrap; }
        .badge-margin-neg { background-color: #dc3545; }
        .badge-margin-low { background-color: #fd7e14; }
        .badge-margin-ok { background-color: #198754; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">NSC Micro Market</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/margins' in request.path %}active{% endif %}" href="/analysis/margins">Margins</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/shrinkage' in request.path %}active{% endif %}" href="/analysis/shrinkage">Shrinkage</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/velocity' in request.path %}active{% endif %}" href="/analysis/velocity">Velocity</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/settings' in request.path %}active{% endif %}" href="/settings">Settings</a>
                    </li>
                </ul>
                <button class="btn btn-outline-light btn-sm" onclick="triggerIngest('incremental')">Sync Now</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        function triggerIngest(mode) {
            fetch('/ingest', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mode: mode, days: 30})
            })
            .then(r => r.json())
            .then(data => {
                alert('Sync ' + data.status + '. Records fetched: ' + (data.records_fetched || 0));
                location.reload();
            })
            .catch(() => alert('Sync request failed. Check the server log.'));
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
